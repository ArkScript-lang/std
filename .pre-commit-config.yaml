repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.2.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 'v3.2.0'
    hooks:
      - id: conventional-pre-commit
        stages: [ commit-msg ]
        args: [ ]
  - repo: local
    hooks:
      - id: arkscript-format
        name: Format ArkScript code
        description: This hook formats ArkScript code
        entry: scripts/check-ark-format.sh
        files: '^.+\.ark'
        language: script
        types: [ text ]
